<html lang="en">
<head>

    :root {
      --text: #1c1c1e;
      --secondary: #8e8e93;
      --blue: #0a84ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 20% -10%, #ffffff, #edf1ff 45%, #eef2f7 100%);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      color: var(--text);
      padding: 16px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .phones {
      width: min(980px, 100%);
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: center;
    }
    .phone {
      width: min(430px, 48vw);
      aspect-ratio: 9 / 19.5;
      background: #111;
      border-radius: 46px;
      padding: 14px;
      position: relative;
      box-shadow: 0 30px 70px rgba(0,0,0,.35), inset 0 0 0 2px #2a2a2a;
    }
    .notch {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 38%;
      height: 28px;
      background: #0b0b0b;
      border-radius: 0 0 18px 18px;
      z-index: 5;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: #f2f2f7;
      border: 1px solid #2f2f2f;
    }
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 36%;
      height: 5px;
      background: rgba(255,255,255,.75);
      border-radius: 999px;
      z-index: 6;
    }

    .app {
      width: 100%;
      height: 100%;
      padding: 56px 16px 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(60,60,67,.12);
      gap: 8px;
    }
    .topbar-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    #viewerTitle {
      line-height: 1.1;
      font-size: 1.06rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .category-title { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; margin: 8px 0 0; }
    .category-sub { color: #4a4a4c; margin: 0 0 6px; }
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      overflow: auto;
      padding-right: 2px;
    }
    .category-btn {
      position: relative;
      border: 1px solid rgba(10,132,255,.18);
      border-radius: 16px;
      padding: 14px 12px;
      background: rgba(255,255,255,.92);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }
    .category-btn .emoji { font-size: 1.5rem; }
    .category-btn .name { font-weight: 700; }
    .category-btn .meta { color: var(--secondary); font-size: .82rem; }
    .category-btn.locked {
      background: repeating-linear-gradient(
        -45deg,
        rgba(245,245,248,.95),
        rgba(245,245,248,.95) 8px,
        rgba(235,235,240,.95) 8px,
        rgba(235,235,240,.95) 16px
      );
      border-color: rgba(60,60,67,.18);
      color: #7a7a80;
      cursor: not-allowed;
      filter: grayscale(.25);
    }
    .category-btn .lock-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: .72rem;
      background: #fff;
      color: #6b6b73;
      border: 1px solid rgba(60,60,67,.2);
      border-radius: 999px;
      padding: 3px 7px;
      font-weight: 700;
    }

    .stage {
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      flex: 1;
      min-height: 0;
      border: 1px solid rgba(10,132,255,.14);
      overflow: hidden;
    }
    .card {
      padding: 10px;
      text-align: center;
      transition: transform 220ms ease;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .animal-video {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: cover;
      object-position: center;
      border-radius: 18px;
      border: 3px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
      background: #111;
    }
    h1 { margin: 12px 0 6px; font-size: 1.9rem; letter-spacing: -0.02em; }
    .desc { margin: 8px 0 0; background:#f7f7fa; border-radius:14px; padding:10px; font-size:.95rem; line-height:1.35; color:#2c2c2e; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: auto;
      padding-top: 12px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.97); }
    .prev,.next {
      background: rgba(118,118,128,.16);
      color:#1c1c1e;
      border: 1px solid rgba(60,60,67,.18);
    }
    .sound {
      background: var(--blue);
      color:#fff;
      box-shadow: 0 6px 16px rgba(10,132,255,.33), inset 0 1px 0 rgba(255,255,255,.28);
    }

    .change-category {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 10px;
      padding: 0;
      background: rgba(10,132,255,.10);
      color: var(--blue);
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1;
      display: inline-grid;
      place-items: center;
    }

    .left-note { text-align:center; margin-top:10px; font-size:.82rem; color:var(--secondary); }

    .layout {
      width: min(980px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .theme-toggle-wrap { display:flex; justify-content:flex-end; }
    .theme-toggle {
      border: 1px solid rgba(60,60,67,.2);
      background: #fff;
      color: #1c1c1e;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: .9rem;
      font-weight: 600;
    }

    .dark-row .screen { background: #111318; border-color: #2d3138; }
    .dark-row .app { color: #f5f5f7; }
    .dark-row .topbar { border-bottom-color: rgba(255,255,255,.12); }
    .dark-row .category-sub,
    .dark-row .left-note,
    .dark-row .category-btn .meta { color: #a5acb8; }
    .dark-row .category-btn {
      background: #1a1f28;
      border-color: rgba(255,255,255,.12);
      color: #f5f5f7;
    }
    .dark-row .category-btn.locked {
      background: repeating-linear-gradient(-45deg,#202530,#202530 8px,#1b202a 8px,#1b202a 16px);
      color: #8e96a3;
      border-color: rgba(255,255,255,.12);
    }
    .dark-row .category-btn .lock-badge {
      background: #0f131a;
      color: #c6ccd8;
      border-color: rgba(255,255,255,.12);
    }
    .dark-row .stage { background: #1a1f28; border-color: rgba(255,255,255,.12); }
    .dark-row .desc { background: #12161d; color: #d6dbe4; }
    .dark-row .prev,
    .dark-row .next { background: #232936; color: #e9edf5; border-color: rgba(255,255,255,.12); }
    .dark-row .change-category { background: rgba(10,132,255,.2); color: #74b4ff; }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .phones { flex-direction: column; }
      .phone { width: min(430px, 100%); }
    }
  </style>
</head>

          "description": {
            "en": "A striped apex predator with great strength, sharp senses, and silent stalking skills.",
            "lt": "Dryžuotas viršūninis plėšrūnas, pasižymintis jėga, aštriais pojūčiais ir tyliu sėlinimu."
          }
        },
        "jungle_toucan_22": {
          "description": {
            "en": "A tropical bird with a large colorful bill, known for hopping between canopy branches.",
            "lt": "Atogrąžų paukštis su dideliu spalvingu snapu, dažnai šokinėjantis tarp medžių lajų šakų."
          }
        }
      }
    };

    function renderCategories() {
      categoryGrid.innerHTML = '';
      Object.entries(library).forEach(([key, cat]) => {
        const btn = document.createElement('button');
        const isLocked = cat.purchased === false;
        btn.className = `category-btn${isLocked ? ' locked' : ''}`;
        btn.type = 'button';
        btn.innerHTML = `
          <span class="emoji">${cat.emoji}</span>
          <span class="name">${cat.label}</span>
          <span class="meta">${cat.comingSoon ? 'Not ready yet' : `${cat.animals.length} animals`}</span>
          ${isLocked ? `<span class="lock-badge">${cat.comingSoon ? '⏳ Coming soon' : '🔒 Locked'}</span>` : ''}
        `;
        btn.addEventListener('click', () => {
          if (isLocked) {
            if (cat.comingSoon) {
              alert(`${cat.label} pack is not ready yet. It will be available soon.`);
            }
            return;
          }
          selectCategory(key);
        });
        categoryGrid.appendChild(btn);
      });
    }

    function selectCategory(key) {
      currentCategory = key;
      animals = library[key].animals;
      index = 0;
      viewerTitle.textContent = `${library[key].emoji} ${library[key].label} animals`;
      render(0);
    }

    function render(dir = 0) {
      if (!animals.length) {
        nameEl.textContent = 'No animals yet';
        desc.textContent = 'This pack has no data.';
        video.removeAttribute('src');
        return;
      }

      const a = animals[index];
      card.style.transform = `translateX(${dir * 24}px)`;
      setTimeout(() => {
        video.src = a.video;
        video.load();
        video.play().catch(() => {});
        nameEl.textContent = a.name;
        desc.textContent = a.desc;
        card.style.transform = 'translateX(0)';
      }, 100);
    }

    function next() { if (animals.length) { index = (index + 1) % animals.length; render(1); } }
    function prev() { if (animals.length) { index = (index - 1 + animals.length) % animals.length; render(-1); } }


    async function loadJunglePack() {
      const items = embeddedJunglePack?.pack?.items || [];
      const textItems = embeddedJungleTexts?.items || {};
      const assetPrefix = '../content/packs/jungle';

      library.jungle.animals = items.map((item) => ({
        id: item.id,
        name: item.name,
        desc: textItems[item.id]?.description?.en || 'No description',
        sound: `${assetPrefix}/sounds/${item.fileBase}.mp3`,
        video: `${assetPrefix}/videos/${item.fileBase}.mp4`
      }));
    }


    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.getElementById('soundBtn').addEventListener('click', async () => {
      const a = animals[index];
      if (!a?.sound) return;

      const soundUrl = encodeURI(a.sound);
      try {
        soundPlayer.pause();
        soundPlayer.currentTime = 0;
        soundPlayer.muted = false;
        soundPlayer.volume = 1;
        soundPlayer.src = soundUrl;
        soundPlayer.load();
        await soundPlayer.play();
      } catch (err) {
        console.warn('Primary audio player failed, trying fallback <audio> instance', err);
        try {
          const fallback = new Audio(soundUrl);
          fallback.volume = 1;
          await fallback.play();
        } catch (err2) {
          console.error('Sound playback failed:', err2);
          alert('Could not play sound file for this animal.');
        }
      }
    });
    document.getElementById('changeCategoryBtn').addEventListener('click', () => {
      document.querySelector('.phones').scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    themeToggleBtn.addEventListener('click', () => {
      const dark = previewRow.classList.toggle('dark-row');
      themeToggleBtn.textContent = dark ? '☀️ Light theme' : '🌙 Dark theme';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });


    (async () => {
      renderCategories();
      await loadJunglePack();
      renderCategories();
      selectCategory('jungle');
    })();
  </script>

</body>
</html>
